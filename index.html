<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI会議室</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #111;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #timeline {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    .msg {
      margin-bottom: 12px;
      padding: 10px 14px;
      border-radius: 12px;
      max-width: 80%;
    }
    .user { background: #2563eb; margin-left: auto; }
    .jin { background: #333; }
    #inputArea {
      display: flex;
      padding: 10px;
      background: #000;
    }
    input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }
    button {
      margin-left: 8px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #22c55e;
      color: black;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div id="timeline"></div>

<div id="inputArea">
  <input id="input" placeholder="中原、何を話す？" />
  <button onclick="send()">送信</button>
</div>

<script>
const timeline = document.getElementById("timeline");
const input = document.getElementById("input");

function addMessage(text, sender) {
  const div = document.createElement("div");
  div.className = "msg " + sender;
  div.textContent = text;
  timeline.appendChild(div);
  timeline.scrollTop = timeline.scrollHeight;
}

function fakeAIResponse(userText) {
  const responses = [
    "なるほど、それ面白い視点だ。",
    "もう少し具体的に聞かせて。",
    "それ、伸びる可能性あるな。",
    "中原の強みが出てる。",
    "あーし的にはアリ。"
  ];
  return responses[Math.floor(Math.random() * responses.length)];
}

function send() {
  const text = input.value.trim();
  if (!text) return;
  addMessage("中原: " + text, "user");
  input.value = "";

  setTimeout(() => {
    const reply = fakeAIResponse(text);
    addMessage("仁: " + reply, "jin");
  }, 500);
}
</script>

</body>
</html>
