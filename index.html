<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />

  <!-- 端末差の“ズレ”を減らす基本セット -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0c" />
  <meta name="color-scheme" content="dark" />

  <title>KaiGI</title>

  <!-- iOS / PWA -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="KaiGI" />
  <link rel="apple-touch-icon" href="./icon-192.png" />

  <!-- CSSが来る前に “白フラッシュ/白い余白” を絶対出さない -->
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #0b0b0c; /* ここで白を封殺 */
      color: #fff;
      height: 100%;
      overscroll-behavior: none; /* 余計なゴムバンド感を減らす（本丸はstyle.css） */
    }
  </style>

  <link rel="stylesheet" href="./style.css" />
  <script defer src="./app.js"></script>

  <!-- iOSのvh問題：機種/アドレスバー/キーボードで崩れない高さ -->
  <script>
    (function () {
      const setH = () => {
        const h = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
        document.documentElement.style.setProperty('--app-h', h + 'px');
      };
      setH();
      window.addEventListener('resize', setH, { passive: true });
      if (window.visualViewport) window.visualViewport.addEventListener('resize', setH, { passive: true });
    })();
  </script>
</head>

<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand__title">KaiGI</div>
        <div class="brand__pill" id="modePill">Mode: ChatGPT</div>
      </div>
      <div class="brand__pill" id="pwaPill">PWA: -</div>

      <div class="tabs">
        <button class="tab is-active" data-mode="gpt">ChatGPT</button>
        <button class="tab" data-mode="claude">Claude</button>
        <button class="tab" data-mode="gemini">Gemini</button>
        <button class="tab" data-mode="music">音楽</button>
      </div>

      <div class="actions">
        <button class="chip" data-mode="all">全員会議</button>
        <button class="chip" id="rageBtn">暴走（長文）</button>
        <button class="chip chip--danger" id="clearBtn">履歴クリア</button>
      </div>
    </header>

    <main class="stage">
      <section class="chat" id="chat" aria-live="polite"></section>

      <footer class="composer">
        <input
          id="input"
          class="composer__input"
          type="text"
          inputmode="text"
          autocomplete="off"
          autocapitalize="none"
          autocorrect="off"
          spellcheck="false"
          placeholder="中原、何を話す？"
        />
        <button id="sendBtn" class="composer__send">送信</button>
      </footer>

      <div class="hint">
        ※いまは“ダミー応答”。後でAPI接続すると本物のAIになる。<br/>
        iPhoneはSafariで開いて「共有 → ホーム画面に追加」でアプリ化。
      </div>
    </main>
  </div>
</body>
</html>
