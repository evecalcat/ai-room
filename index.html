<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI会議室</title>

<!-- PWA -->
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#111111">

<!-- iOS対応 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI会議室">
<link rel="apple-touch-icon" href="./icon-192.png">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #111;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

#timeline {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

.msg {
  max-width: 80%;
  padding: 12px 16px;
  margin: 8px 0;
  border-radius: 16px;
}

.user {
  background: #2d6cdf;
  align-self: flex-end;
}

.jin {
  background: #333;
  align-self: flex-start;
}

#inputArea {
  display: flex;
  padding: 12px;
  background: #222;
}

#input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  font-size: 16px;
}

button {
  margin-left: 8px;
  padding: 12px 16px;
  border: none;
  border-radius: 10px;
  background: #2ecc71;
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>
<div id="timeline"></div>

<div id="inputArea">
  <input id="input" placeholder="中原、何を話す？">
  <button onclick="send()">送信</button>
</div>

<script>
const timeline = document.getElementById("timeline");
const input = document.getElementById("input");

function addMessage(text, sender) {
  const div = document.createElement("div");
  div.className = "msg " + sender;
  div.textContent = (sender === "user" ? "中原: " : "仁: ") + text;
  timeline.appendChild(div);
  timeline.scrollTop = timeline.scrollHeight;
}

function fakeAIResponse(userText) {
  const responses = [
    "なるほど、それ面白い視点だ。",
    "もう少し具体的に聞かせて。",
    "それ、伸びる可能性あるな。",
    "中原の強みが出てる。",
    "あーし的にはアリ。"
  ];
  return responses[Math.floor(Math.random() * responses.length)];
}

function send() {
  const text = input.value.trim();
  if (!text) return;
  addMessage(text, "user");
  input.value = "";

  setTimeout(() => {
    const reply = fakeAIResponse(text);
    addMessage(reply, "jin");
  }, 500);
}

// PWA用 Service Worker 登録
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").catch(()=>{});
}
</script>
</body>
</html>
