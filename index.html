<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI会議室</title>

<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#1a1f3a">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #1a1f3a;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 12px;
  background: rgba(18,23,50,0.95);
  font-weight: bold;
}

#timeline {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
}

.msg {
  margin-bottom: 10px;
}

.user { color: #25d366; }
.jin { color: #4f8ef7; }

#input-area {
  display: flex;
  padding: 10px;
  background: rgba(12,17,42,0.97);
}

textarea {
  flex: 1;
  border-radius: 20px;
  border: none;
  padding: 10px;
}

button {
  margin-left: 8px;
  border: none;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  background: #4f8ef7;
  color: white;
  font-size: 16px;
}
</style>
</head>

<body>
<header>AI会議室</header>

<div id="timeline"></div>

<div id="input-area">
  <textarea id="input" placeholder="メッセージ"></textarea>
  <button onclick="send()">送信</button>
</div>

<script src="./app.js"></script>
</body>
</html>
