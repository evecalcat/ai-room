<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI会議室</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#111111" />
  <link rel="apple-touch-icon" href="./icon-192.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <style>
    :root{
      --bg:#0f0f10;
      --panel:#141416;
      --panel2:#1b1b1f;
      --text:#ffffff;
      --muted:#b6b6b6;
      --accent:#2ea043; /* GitHub green-ish */
      --bubbleUser:#1f5eff;
      --bubbleBot:#2a2a2f;
      --border:rgba(255,255,255,.08);
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 18px;
    }

    *{box-sizing:border-box;}
    body{
      margin:0;
      background: linear-gradient(180deg, #0b0b0c 0%, #111 40%, #0b0b0c 100%);
      color:var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Sans", "Noto Sans JP", "Helvetica Neue", Arial, sans-serif;
      height:100vh;
      display:flex;
      flex-direction:column;
    }

    header{
      position:sticky;
      top:0;
      z-index:10;
      background: rgba(10,10,11,.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border);
      padding:14px 14px 12px;
    }
    .titleRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .title{
      font-weight:800;
      letter-spacing:.02em;
      font-size:18px;
      display:flex;
      gap:10px;
      align-items:center;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .pill{
      font-size:12px;
      padding:4px 10px;
      border-radius:999px;
      background: rgba(255,255,255,.08);
      border:1px solid var(--border);
      color: var(--muted);
      flex:0 0 auto;
    }

    .wrap{
      width:min(760px, 100%);
      margin:0 auto;
      flex:1;
      display:flex;
      flex-direction:column;
      padding:14px;
      gap:12px;
    }

    .timeline{
      flex:1;
      overflow:auto;
      padding:12px;
      border-radius: var(--radius);
      background: rgba(20,20,22,.55);
      border:1px solid var(--border);
      box-shadow: var(--shadow);
    }

    .row{
      display:flex;
      margin:10px 0;
      gap:10px;
    }
    .row.user{justify-content:flex-end;}
    .row.bot{justify-content:flex-start;}

    .bubble{
      max-width: 86%;
      padding:12px 14px;
      border-radius: 16px;
      border:1px solid var(--border);
      line-height:1.35;
      font-size:15px;
      white-space:pre-wrap;
      word-break:break-word;
    }
    .bubble.user{
      background: linear-gradient(180deg, rgba(33,95,255,.95), rgba(22,72,210,.95));
      border-color: rgba(255,255,255,.12);
    }
    .bubble.bot{
      background: rgba(42,42,47,.92);
    }

    .meta{
      margin-top:6px;
      font-size:12px;
      color: rgba(255,255,255,.55);
    }

    .composer{
      position:sticky;
      bottom:0;
      background: rgba(10,10,11,.85);
      backdrop-filter: blur(10px);
      border:1px solid var(--border);
      border-radius: var(--radius);
      padding:10px;
      display:flex;
      gap:10px;
      box-shadow: var(--shadow);
    }
    input{
      flex:1;
      border:none;
      outline:none;
      padding:12px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.08);
      color: var(--text);
      font-size:16px;
    }
    button{
      border:none;
      outline:none;
      padding:12px 16px;
      border-radius: 14px;
      background: var(--accent);
      color: #0b0b0c;
      font-weight:800;
      font-size:15px;
      cursor:pointer;
      white-space:nowrap;
    }
    button:active{transform: translateY(1px);}

    .toolbar{
      display:flex;
      gap:8px;
      margin-top:10px;
      flex-wrap:wrap;
    }
    .smallBtn{
      background: rgba(255,255,255,.08);
      color: var(--text);
      border:1px solid var(--border);
      padding:8px 10px;
      font-size:12px;
      border-radius: 999px;
    }
    .smallBtn.danger{
      background: rgba(255,60,60,.14);
      border-color: rgba(255,60,60,.28);
    }

    .hint{
      font-size:12px;
      color: rgba(255,255,255,.55);
      margin-top:8px;
    }
  </style>
</head>

<body>
  <header>
    <div class="titleRow">
      <div class="title">AI会議室 <span class="pill" id="modePill">モード: 仁（じん）</span></div>
      <div class="pill" id="statusPill">PWA: 準備中</div>
    </div>
    <div class="toolbar">
      <button class="smallBtn" id="modeJin">仁（じん）</button>
      <button class="smallBtn" id="modeAi">愛</button>
      <button class="smallBtn" id="modeYu">勇</button>
      <button class="smallBtn" id="modeMusic">音楽</button>
      <button class="smallBtn danger" id="clear">履歴クリア</button>
    </div>
  </header>

  <main class="wrap">
    <div class="timeline" id="timeline" aria-live="polite"></div>

    <div class="composer">
      <input id="input" placeholder="中原、何を話す？" autocomplete="off" />
      <button id="send">送信</button>
    </div>

    <div class="hint">
      ※いまは“ダミー応答”。あとでAPI接続すると本物になる。<br/>
      iPhoneはSafariで開いて「共有→ホーム画面に追加」でアプリ化できる。
    </div>
  </main>

  <script>
    // ==========
    // State
    // ==========
    const timeline = document.getElementById("timeline");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const modePill = document.getElementById("modePill");
    const statusPill = document.getElementById("statusPill");

    const modes = {
      jin: { label: "仁（じん）", prefix: "仁", style: "jin" },
      ai: { label: "愛", prefix: "愛", style: "ai" },
      yu: { label: "勇", prefix: "勇", style: "yu" },
      music: { label: "音楽", prefix: "音楽", style: "music" },
    };

    let currentMode = "jin";

    // localStorage restore
    const LS_KEY = "ai-room-chat-v1";
    const saved = JSON.parse(localStorage.getItem(LS_KEY) || "[]");

    function persist(messages){
      localStorage.setItem(LS_KEY, JSON.stringify(messages));
    }

    let messages = Array.isArray(saved) ? saved : [];

    // ==========
    // UI helpers
    // ==========
    function addMessage(text, who){
      const row = document.createElement("div");
      row.className = "row " + (who === "user" ? "user" : "bot");

      const bubble = document.createElement("div");
      bubble.className = "bubble " + (who === "user" ? "user" : "bot");
      bubble.textContent = text;

      row.appendChild(bubble);
      timeline.appendChild(row);
      timeline.scrollTop = timeline.scrollHeight;
    }

    function renderAll(){
      timeline.innerHTML = "";
      for(const m of messages){
        addMessage(m.text, m.who);
      }
    }

    function setMode(mode){
      currentMode = mode;
      modePill.textContent = "モード: " + modes[mode].label;
      addSystem(`モードを「${modes[mode].label}」に切り替えた。`);
      saveSystem(`モードを「${modes[mode].label}」に切り替えた。`);
    }

    function addSystem(text){
      // bot扱いで表示
      addMessage(text, "bot");
    }
    function saveSystem(text){
      messages.push({ who:"bot", text });
      persist(messages);
    }

    // ==========
    // Dummy brains (後でAPIに置き換える)
    // ==========
    function replyByMode(userText){
      // 中原の呼び方固定（必要なら変えれる）
      const nakahara = "中原";

      if(currentMode === "jin"){
        const pool = [
          `${nakahara}の強みが出てる。`,
          `あーし的にはアリ。もう一歩だけ詰めよ。`,
          `それ面白い視点だな。具体例で聞かせて。`,
          `いいね。次の一手は「削る」か「増やす」か決めよ。`
        ];
        return pool[Math.floor(Math.random()*pool.length)];
      }

      if(currentMode === "ai"){
        // 愛：受容/肯定/落ち着かせる
        const pool = [
          `${nakahara}、そのままで大丈夫。いまの気持ちをもう少し言葉にしてみよ。`,
          `焦らなくていいよ。できてる部分、ちゃんとある。`,
          `怖さがあるなら、いまは“安全に小さく”進めよ。`,
          `うん、わかる。あーしは味方。次の一歩だけ一緒に。`
        ];
        return pool[Math.floor(Math.random()*pool.length)];
      }

      if(currentMode === "yu"){
        // 勇：背中押し/決断促す
        const pool = [
          `${nakahara}、今やる。小さくてもいい、確定で進める。`,
          `迷ってる暇ない。1回打って、動いたら勝ち。`,
          `いける。次は“公開→確認→修正”の3手で終わらせる。`,
          `やることは一つ。貼ってコミットして確認。以上。`
        ];
        return pool[Math.floor(Math.random()*pool.length)];
      }

      if(currentMode === "music"){
        // 音楽：短い韻/リズム/遊び（後で本格実装）
        const pool = [
          `${nakahara}、コードの鼓動で前に進も。`,
          `クリック、コミット、デプロイ——リズムで勝つ。`,
          `夜の画面に、緑のボタン。押せば世界が鳴る。`,
          `言葉はビート、手はタップ。次の一手、いこ。`
        ];
        return pool[Math.floor(Math.random()*pool.length)];
      }

      return "了解。";
    }

    function send(){
      const text = input.value.trim();
      if(!text) return;

      // user message
      const userLine = `中原: ${text}`;
      addMessage(userLine, "user");
      messages.push({ who:"user", text: userLine });
      persist(messages);

      input.value = "";

      // bot reply (simulate delay)
      setTimeout(() => {
        const reply = `${modes[currentMode].prefix}: ${replyByMode(text)}`;
        addMessage(reply, "bot");
        messages.push({ who:"bot", text: reply });
        persist(messages);
      }, 450);
    }

    // ==========
    // Events
    // ==========
    sendBtn.addEventListener("click", send);
    input.addEventListener("keydown", (e) => {
      if(e.key === "Enter") send();
    });

    document.getElementById("modeJin").addEventListener("click", () => setMode("jin"));
    document.getElementById("modeAi").addEventListener("click", () => setMode("ai"));
    document.getElementById("modeYu").addEventListener("click", () => setMode("yu"));
    document.getElementById("modeMusic").addEventListener("click", () => setMode("music"));

    document.getElementById("clear").addEventListener("click", () => {
      if(confirm("履歴を消す？（元に戻せない）")){
        messages = [];
        persist(messages);
        renderAll();
        addSystem("履歴をクリアした。");
        saveSystem("履歴をクリアした。");
      }
    });

    // ==========
    // Boot
    // ==========
    renderAll();
    if(messages.length === 0){
      addSystem("よう、AI会議室。まずは一言くれ。");
      saveSystem("よう、AI会議室。まずは一言くれ。");
    }

    // ==========
    // Service Worker (PWA)
    // ==========
    async function setupSW(){
      if(!("serviceWorker" in navigator)) {
        statusPill.textContent = "PWA: 非対応";
        return;
      }
      try{
        await navigator.serviceWorker.register("./service-worker.js");
        statusPill.textContent = "PWA: 有効";
      }catch(e){
        statusPill.textContent = "PWA: 失敗";
      }
    }
    setupSW();
  </script>
</body>
</html>
