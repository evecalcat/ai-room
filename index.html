<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />

  <!-- iOS / 端末差の“ズレ”を抑える -->
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0a10" />
  <meta name="color-scheme" content="dark" />

  <title>ai-kaigi</title>

  <!-- PWA -->
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ai-kaigi" />
  <link rel="apple-touch-icon" href="./icon-192.png" />

  <!-- 白フラッシュ封殺 -->
  <style>
    html, body { margin:0; padding:0; background:#0b0a10; color:#fff; height:100%; }
  </style>

  <link rel="stylesheet" href="./style.css" />
  <script defer src="./app.js"></script>

  <!-- iOSのvhズレ対策 -->
  <script>
    (function () {
      const setH = () => {
        const h = (window.visualViewport ? window.visualViewport.height : window.innerHeight);
        document.documentElement.style.setProperty('--app-h', h + 'px');
      };
      setH();
      window.addEventListener('resize', setH, { passive: true });
      if (window.visualViewport) window.visualViewport.addEventListener('resize', setH, { passive: true });
    })();
  </script>
</head>

<body>
  <div class="app" id="app">
    <!-- Top -->
    <header class="top safe-top">
      <button class="icon-btn" id="closeBtn" aria-label="close">×</button>

      <div class="title">
        <div class="title__main">ai-kaigi</div>
        <div class="title__sub"><span class="brand">AI会議室</span></div>
      </div>

      <button class="icon-btn" id="menuBtn" aria-label="menu">•••</button>
    </header>

    <!-- Tool row -->
    <div class="toolbar">
      <button class="pill" id="apiBtn" type="button">⚙️ APIキー設定</button>
      <div class="ghost" aria-hidden="true"></div>
    </div>

    <!-- Tabs -->
    <nav class="tabs" id="tabs" aria-label="rooms">
      <button class="tab is-active" data-room="all" type="button">All</button>
      <button class="tab" data-room="love" type="button">愛</button>
      <button class="tab" data-room="jin" type="button">仁</button>
      <button class="tab" data-room="sync" type="button">統合</button>
    </nav>

    <!-- Timeline -->
    <main class="stage" id="stage">
      <section class="timeline" id="timeline" aria-live="polite"></section>
    </main>

    <!-- Composer -->
    <footer class="composer safe-bottom" id="composer">
      <label class="composer__box">
        <input
          id="input"
          class="composer__input"
          type="text"
          inputmode="text"
          autocomplete="off"
          autocapitalize="none"
          autocorrect="off"
          spellcheck="false"
          placeholder="メッセージを入力..."
        />
      </label>
      <button id="sendBtn" class="composer__send" type="button" aria-label="send">
        <span class="sendIcon">↑</span>
      </button>
    </footer>

    <!-- Modal -->
    <div class="modal" id="modal" aria-hidden="true">
      <div class="modal__backdrop" id="modalBackdrop"></div>
      <div class="modal__sheet" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <div class="modal__head">
          <div class="modal__title" id="modalTitle">設定</div>
          <button class="icon-btn" id="modalClose" aria-label="close modal">×</button>
        </div>

        <div class="modal__body">
          <div class="field">
            <div class="field__label">デモ</div>
            <div class="field__hint">今は“ダミー応答”。後でAPI接続すると本物のAIになる。</div>
          </div>

          <div class="field">
            <div class="field__label">見た目</div>
            <div class="field__hint">紫がイメージカラー。ボタン・枠線・発光が紫で統一。</div>
          </div>

          <div class="field">
            <button class="danger" id="clearBtn" type="button">履歴をクリア</button>
          </div>

          <div class="field">
            <div class="field__hint">
              iPhone: Safariで開く → 共有 → 「ホーム画面に追加」でアプリ化。
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
