<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI会議室</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f1220;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .card {
      background: #1b1f38;
      padding: 24px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }
    h1 { margin: 0 0 8px; }
    p { opacity: 0.7; }
    .badge {
      margin-top: 12px;
      display: inline-block;
      padding: 6px 12px;
      background: #ff3b3b;
      border-radius: 999px;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>AI会議室</h1>
    <p>仁が起動しました</p>
    <div class="badge">PWA準備OK</div>
  </div>
</body>
</html>
